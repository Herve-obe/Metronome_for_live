name: metronome_for_live
description: Professional live metronome for drummers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.7.1
  
  # Audio
  just_audio: ^0.9.40
  audio_session: ^0.1.23
  
  # Database
  sqflite: ^2.4.1
  path: ^1.9.0
  
  # TTS
  flutter_tts: ^4.2.2
  
  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.1
  just_audio_windows: ^0.2.2
  qr_flutter: ^4.1.0
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
